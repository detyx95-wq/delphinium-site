<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Configurateur bague Delphinium — chaton fleur, métal, pierre et gravure personnalisables en temps réel.">
  <title>Bague sur mesure — Collection fleur · Delphinium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fleur+De+Leah&family=Yeseva+One&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Marcellus&display=swap" rel="stylesheet">
  <style>
    :root {
      /* ── Palette pastel sombre (Nymphéas mauve) ── */
      --bg:#3F3A5C; --bg2:#4A4368;
      --panel:rgba(78,68,108,.55);
      --panel-line:rgba(237,231,242,.14);
      --panel-line-h:rgba(237,231,242,.28);
      --ink:#F2ECF7; --ink-soft:#c6bcd6; --ink-faint:rgba(242,236,247,.4);
      --mauve:#A895C4; --mauve-deep:#6E5DA0;

      /* Variables métal — mises à jour par le sélecteur métal sur :root */
      --metal-primary:#D4B884;
      --metal-accent:#EED9A8;

      /* Variables pierre — mises à jour par le sélecteur pierre sur :root */
      --stone-primary:#9DB8A2;
      --stone-glow:#C0DCC5;
      --stone-petal:#A895C4;   /* teinte pétales floraux, dérive de la pierre */
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin:0; font-family:'Cormorant Garamond',Georgia,serif; font-weight:400;
      background:var(--bg); color:var(--ink); min-height:100vh;
      -webkit-font-smoothing:antialiased;
    }
    /* familles d'affichage */
    .brand-mark-name { font-family:'Yeseva One',serif; }
    .product-title { font-family:'Fleur De Leah',cursive; }
    .back-link, .brand-mark-sub, .collection, .card h2, .cta,
    footer, .shape-name, .price .cur, .status {
      font-family:'Marcellus',serif;
    }

    /* ── ATMOSPHÈRE : halos radiaux flous réactifs + grain ── */
    .water { position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
    .water::before {
      content:''; position:absolute; inset:-15%;
      background:
        radial-gradient(ellipse 45% 42% at 78% 18%, color-mix(in srgb, var(--stone-primary) 45%, transparent), transparent 70%),
        radial-gradient(ellipse 40% 45% at 12% 28%, color-mix(in srgb, var(--stone-petal) 55%, transparent), transparent 70%),
        radial-gradient(ellipse 55% 50% at 28% 88%, color-mix(in srgb, var(--mauve) 38%, transparent), transparent 70%),
        radial-gradient(ellipse 40% 40% at 92% 78%, color-mix(in srgb, var(--metal-accent) 32%, transparent), transparent 70%);
      filter: blur(80px); opacity:.75;
      transition: background 900ms ease;
    }
    .grain {
      position:fixed; inset:0; z-index:1; pointer-events:none;
      opacity:.045; mix-blend-mode:overlay;
    }

    /* ── HEADER ── */
    header {
      position:relative; z-index:2;
      display:flex; align-items:center; justify-content:space-between;
      padding:22px 48px;
    }
    .back-link {
      display:flex; align-items:center; gap:8px;
      font-size:12px; letter-spacing:.14em; text-transform:uppercase;
      color:var(--ink-soft); text-decoration:none; transition:color .25s;
    }
    .back-link:hover { color:var(--ink); }
    .back-link::before { content:'←'; }
    .brand-mark { display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
    .brand-mark-name {
      font-family:'Yeseva One',serif; font-size:21px; letter-spacing:.01em; color:var(--ink);
    }
    .brand-mark-sub {
      font-size:10px; letter-spacing:.28em; text-transform:uppercase;
      color:var(--metal-primary); font-weight:500; transition:color .5s ease;
    }

    /* ── LAYOUT CONFIGURATEUR ── */
    .wrap {
      position:relative; z-index:2;
      display:grid; align-items:start;
      grid-template-columns:minmax(0,1.4fr) minmax(340px,1fr);
      grid-template-areas:
        "head   head"
        "viewer panel";
      column-gap:44px;
      padding:24px 48px 90px; max-width:1180px; margin:0 auto;
    }
    .product-head { grid-area:head; }
    .viewer { grid-area:viewer; }
    .panel  { grid-area:panel; min-width:0; }

    /* ── VIEWER + cadre peint ── */
    .viewer { position:relative; }
    .viewer-inner { position:relative; }
    .viewer-frame {
      position:relative; border-radius:6px; overflow:hidden;
      background:transparent;
      transition:box-shadow .5s;
    }
    .viewer-frame.pulse {
      box-shadow:0 0 40px -6px color-mix(in srgb, var(--stone-glow) 60%, transparent);
    }
    iframe { width:100%; height:670px; border:0; display:block; }

    /* cadre pinceau SVG posé par-dessus le viewer (n'intercepte pas les clics Vectary) */
    .brush-frame {
      position:absolute; inset:0; width:100%; height:100%;
      pointer-events:none; z-index:3;
    }
    /* branches aux coins opposés — proportions fixes, jamais étirées, fleurs non coupées */
    .branch {
      position:absolute; width:clamp(130px,24%,190px); aspect-ratio:1;
      pointer-events:none; z-index:4; overflow:visible;
    }
    .branch-tl { top:-26px; left:-24px; }
    .branch-br { right:-26px; bottom:-24px; transform:rotate(180deg); }

    /* ── FICHE PRODUIT ── */
    .product-head { margin:0 0 26px; }
    .collection {
      display:block; font-size:11px; letter-spacing:.22em; text-transform:uppercase;
      color:var(--ink-soft); margin-bottom:10px;
    }
    .product-title {
      font-family:'Fleur De Leah',cursive; font-weight:400;
      font-size:clamp(52px,7vw,82px); line-height:1.06; letter-spacing:.01em;
      color:var(--ink); margin:0 0 4px; padding-bottom:.06em;
    }
    .product-sub {
      font-family:'Cormorant Garamond',serif; font-style:italic;
      font-size:18px; color:var(--stone-primary); margin:0 0 18px;
      min-height:24px; transition:color .5s ease, opacity .3s;
    }
    .price {
      font-family:'Cormorant Garamond',serif; font-size:30px; font-weight:500; color:var(--ink);
      transition:opacity .16s ease, transform .18s ease;
    }
    .price.changing { opacity:0; transform:scale(.96); }
    .price .cur { font-size:15px; font-family:'Marcellus',serif; color:var(--ink-soft); margin-left:6px; letter-spacing:.04em; }

    /* loading indicator — visible pendant l'init réelle uniquement */
    .status {
      font-size:12px; letter-spacing:.04em; color:var(--ink-soft); margin:0 0 20px;
      display:flex; align-items:center; gap:8px;
    }
    .status::before {
      content:''; width:8px; height:8px; border-radius:50%;
      background:var(--metal-accent); box-shadow:0 0 8px var(--metal-accent);
      animation:pulseDot 1.1s ease-in-out infinite;
    }
    @keyframes pulseDot { 0%,100%{opacity:.35;transform:scale(.8);} 50%{opacity:1;transform:scale(1);} }

    /* ── CARTES DE VARIANTES ── */
    .panel { display:flex; flex-direction:column; gap:20px; }
    .card {
      position:relative; padding:22px 24px; border-radius:2px;
      background:var(--panel); backdrop-filter:blur(10px); overflow:visible;
    }
    /* cadre peint léger sur chaque carte */
    .card-frame { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:0; }
    .card > *:not(.card-frame):not(.card-flourish) { position:relative; z-index:2; }
    .card-flourish {
      position:absolute; pointer-events:none; z-index:1; opacity:.9;
      transform-origin:center;
      transition: transform 600ms cubic-bezier(.34,1.56,.64,1);
    }
    .card h2 {
      margin:0 0 14px; font-size:10px; letter-spacing:.2em; text-transform:uppercase;
      color:var(--ink-soft); font-weight:500;
      display:flex; justify-content:space-between; align-items:baseline;
    }

    /* ── Floraison au changement de config ── */
    .card-flourish, .bloomable { transform-box: fill-box; transform-origin: center; }
    .bloom { animation: bloom 700ms cubic-bezier(.34,1.56,.64,1); }
    @keyframes bloom {
      0%   { transform: scale(1) rotate(0deg); }
      35%  { transform: scale(1.15) rotate(3deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    /* Grilles */
    #metals { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    #stones { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
    #shapes { display:flex; gap:14px; }

    /* Métal — pastille métallique bombée (reprise de l'ancienne version, compacte) */
    .metal-opt {
      display:flex; align-items:center; justify-content:center; text-align:center; width:100%;
      height:42px; border-radius:8px;
      font-family:'Marcellus',serif; font-size:12.5px; letter-spacing:.02em;
      border:1.5px solid rgba(0,0,0,.18);
      box-shadow: inset 0 1px 2px rgba(255,255,255,.5), inset 0 -3px 5px rgba(0,0,0,.2);
    }
    .metal-opt:hover:not(.active) {
      transform:scale(1.03);
      box-shadow: inset 0 1px 2px rgba(255,255,255,.5), inset 0 -3px 5px rgba(0,0,0,.2), 0 0 12px var(--glow);
    }
    .metal-opt.active {
      transform:scale(1.04); border-color:rgba(255,255,255,.85);
      box-shadow: inset 0 1px 2px rgba(255,255,255,.55), 0 0 14px var(--glow);
    }

    .opt {
      position:relative; cursor:pointer; border:none; font:inherit; color:inherit;
      transition:all .24s ease;
    }
    .opt:focus-visible { outline:2px solid var(--metal-accent); outline-offset:3px; }

    /* Métal & Pierre — pastilles verre teinté */
    .swatch {
      padding:11px 18px; font-size:13px; border-radius:999px;
      border:1px solid var(--panel-line);
      background: color-mix(in srgb, var(--swatch-color, var(--ink)) 22%, rgba(78,68,108,.4));
      color:var(--ink); overflow:hidden; backdrop-filter:blur(4px);
    }
    .swatch::after {
      content:''; position:absolute; inset:0; opacity:0;
      background: radial-gradient(circle at 30% 20%, rgba(255,255,255,.35), transparent 60%);
      transition:opacity .24s ease;
    }
    .swatch:hover:not(.active) { border-color:var(--panel-line-h); }
    .swatch.active {
      border-color: color-mix(in srgb, var(--swatch-color, var(--metal-primary)) 70%, transparent);
      box-shadow: 0 0 24px -3px color-mix(in srgb, var(--swatch-color, var(--metal-primary)) 65%, transparent);
      transform: scale(1.04); font-weight:500;
    }
    .swatch.active::after { opacity:1; }

    /* Forme & Pierre — silhouette / gemme peinte + nom dessous */
    .shape-opt, .stone-opt {
      flex:1; display:flex; flex-direction:column; align-items:center; gap:8px;
      padding:16px 10px; border-radius:2px; text-align:center; font-size:12px;
      border:1px solid var(--panel-line); background:rgba(78,68,108,.35);
      color:var(--ink);
    }
    .shape-opt:hover:not(.active) { border-color:var(--panel-line-h); }
    .shape-opt.active {
      border-color:var(--metal-primary);
      box-shadow: 0 0 20px -4px color-mix(in srgb, var(--metal-primary) 60%, transparent);
      background: color-mix(in srgb, var(--metal-primary) 8%, transparent);
    }
    .shape-opt svg { display:block; }
    .shape-name { letter-spacing:.02em; }

    /* Pierre — gemme facettée vue de 3/4 */
    .stone-opt { padding:11px 8px 9px; gap:6px; }
    .stone-opt:hover:not(.active) { border-color:var(--panel-line-h); }
    .stone-opt .gem {
      width:32px; height:auto; display:block;
      filter: drop-shadow(0 4px 9px color-mix(in srgb, var(--gem-glow) 40%, transparent));
      transition: transform .28s cubic-bezier(.34,1.56,.64,1), filter .28s ease;
    }
    .stone-opt:hover:not(.active) .gem { transform: translateY(-2px) rotate(-3deg) scale(1.05); }
    .stone-opt.active {
      border-color: color-mix(in srgb, var(--gem) 70%, transparent);
      background: color-mix(in srgb, var(--gem) 9%, transparent);
      box-shadow: 0 0 22px -4px color-mix(in srgb, var(--gem-glow) 70%, transparent);
    }
    .stone-opt.active .gem {
      transform: scale(1.12) rotate(-2deg);
      filter: drop-shadow(0 0 16px color-mix(in srgb, var(--gem-glow) 85%, transparent));
    }
    .stone-opt.active .shape-name { color:var(--gem-glow); }

    /* Gravure */
    .card h2 .counter { font-size:11px; color:var(--ink-faint); font-weight:400; letter-spacing:.05em; }
    .card h2 .counter.max { color:var(--metal-accent); }
    .engrave input {
      width:100%; border:none; border-bottom:1px solid var(--panel-line);
      background:transparent; padding:8px 2px;
      font-family:'Cormorant Garamond',serif; font-style:italic; font-size:15px;
      color:var(--ink); outline:none; transition:border-color .24s ease;
    }
    .engrave input::placeholder { color:var(--ink-faint); }
    .engrave input:focus { border-color:var(--metal-primary); }

    /* ── CTA ── */
    .cta {
      display:block; width:100%; margin-top:8px; padding:18px 20px;
      text-align:center; text-decoration:none;
      font-size:12px; font-weight:500; letter-spacing:.16em; text-transform:uppercase; color:#fff;
      background:linear-gradient(120deg, var(--mauve-deep), var(--mauve));
      border-radius:2px; box-shadow:0 24px 44px -18px rgba(168,149,196,.6);
      transition:transform .2s ease;
    }
    .cta:hover { transform:translateY(-1px); }
    .cta:active { transform:translateY(0); }

    /* ── FOOTER ── */
    footer {
      position:relative; z-index:2;
      padding:30px 48px; border-top:1px solid var(--panel-line);
      display:flex; align-items:center; justify-content:space-between;
      font-size:11px; color:var(--ink-soft);
    }
    footer a { color:var(--ink-soft); text-decoration:none; transition:color .25s; }
    footer a:hover { color:var(--ink); }

    @media (prefers-reduced-motion: reduce) {
      .opt, .viewer-frame, .price, .cta, .water::before, .card-flourish { transition:none; }
      .status::before, .bloom { animation:none; }
    }

    /* ── MOBILE : viewer sticky (comportement préservé) ── */
    @media (max-width:768px) {
      header { padding:18px 22px; }
      .wrap {
        --viewer-h:clamp(320px,78vw,400px);
        grid-template-columns:1fr;
        grid-template-areas:"viewer" "head" "panel";
        gap:0; column-gap:0; padding:12px 22px 60px;
      }
      footer { padding:24px 22px; flex-direction:column; gap:12px; text-align:center; }

      /* sticky pleine largeur : on annule le padding latéral du .wrap (22px) → bord à bord */
      .viewer {
        position:sticky; top:0; z-index:10;
        background:var(--bg); margin:0 -22px; padding:8px 16px 10px;
      }
      .viewer-inner { max-width:none; margin:0; }
      iframe { height:var(--viewer-h); }
      .viewer-frame { border-radius:6px; }
      .branch { width:98px; }
      .branch-tl { top:-14px; left:-14px; }
      .branch-br { right:-14px; bottom:-14px; }

      /* bloc titre/prix collé sous le viewer sticky — pleine largeur (comme le viewer)
         + fondu doux sous le prix pour supprimer toute coupure avec le contenu qui défile */
      .product-head {
        position:sticky; top:calc(var(--viewer-h) + 18px); z-index:9;
        background:var(--bg);
        margin:0 -22px; padding:12px 22px 10px;
      }
      .product-head::after {
        content:''; position:absolute; left:0; right:0; top:100%; height:30px;
        background:linear-gradient(var(--bg), transparent); pointer-events:none;
      }
    }
  </style>
</head>
<body>

  <!-- ── Motifs floraux SVG réutilisables (fill piloté par variables CSS) ── -->
  <svg style="position:absolute;width:0;height:0" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <linearGradient id="stemGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="var(--stone-primary)" stop-opacity=".85"/>
        <stop offset="100%" stop-color="var(--metal-primary)" stop-opacity=".8"/>
      </linearGradient>
      <linearGradient id="frameGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="var(--metal-primary)"/>
        <stop offset="45%" stop-color="var(--stone-petal)"/>
        <stop offset="100%" stop-color="var(--mauve)"/>
      </linearGradient>
      <!-- dégradés doux des pétales/feuilles : lumière au cœur, teinte qui se fond vers le bord -->
      <radialGradient id="petalGrad" cx="36%" cy="30%" r="78%">
        <stop offset="0%"  stop-color="var(--stone-glow)"  stop-opacity=".95"/>
        <stop offset="55%" stop-color="var(--stone-petal)" stop-opacity=".82"/>
        <stop offset="100%" stop-color="var(--stone-petal)" stop-opacity=".5"/>
      </radialGradient>
      <radialGradient id="leafGrad" cx="30%" cy="28%" r="82%">
        <stop offset="0%"  stop-color="var(--stone-glow)"    stop-opacity=".72"/>
        <stop offset="100%" stop-color="var(--stone-primary)" stop-opacity=".58"/>
      </radialGradient>
      <radialGradient id="budGrad" cx="36%" cy="28%" r="78%">
        <stop offset="0%"  stop-color="var(--metal-accent)" stop-opacity=".95"/>
        <stop offset="100%" stop-color="var(--stone-petal)" stop-opacity=".68"/>
      </radialGradient>

      <!-- flou d'aquarelle pur (aucun displacement → zéro pixel visible) -->
      <filter id="softBlur" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
        <feGaussianBlur stdDeviation="2.4"/>
      </filter>
      <filter id="petalSoft" x="-45%" y="-45%" width="190%" height="190%" color-interpolation-filters="sRGB">
        <feGaussianBlur stdDeviation="0.45"/>
      </filter>

      <!-- delphinium 5 pétales — dégradé + cœur lumineux + bords fondus -->
      <symbol id="delph" viewBox="-20 -20 40 40" overflow="visible">
        <g filter="url(#petalSoft)">
          <path d="M0 -14 C6 -18 13 -13 12 -5 C11 1 5 3 0 0 Z" fill="url(#petalGrad)"/>
          <path d="M0 -14 C6 -18 13 -13 12 -5 C11 1 5 3 0 0 Z" fill="url(#petalGrad)" transform="rotate(72)"/>
          <path d="M0 -14 C6 -18 13 -13 12 -5 C11 1 5 3 0 0 Z" fill="url(#petalGrad)" transform="rotate(144)"/>
          <path d="M0 -14 C6 -18 13 -13 12 -5 C11 1 5 3 0 0 Z" fill="url(#petalGrad)" transform="rotate(216)"/>
          <path d="M0 -14 C6 -18 13 -13 12 -5 C11 1 5 3 0 0 Z" fill="url(#petalGrad)" transform="rotate(288)"/>
          <circle r="4.4" fill="url(#budGrad)"/>
          <circle r="1.6" fill="var(--stone-glow)" opacity=".85"/>
        </g>
      </symbol>
      <!-- bouton -->
      <symbol id="bud" viewBox="-10 -10 20 20" overflow="visible">
        <g filter="url(#petalSoft)">
          <ellipse cx="0" cy="-3" rx="4.4" ry="7.4" fill="url(#budGrad)"/>
          <ellipse cx="-1" cy="-4" rx="1.6" ry="3.2" fill="var(--stone-glow)" opacity=".7"/>
        </g>
      </symbol>
      <!-- feuille -->
      <symbol id="leaf" viewBox="-15 -15 30 30" overflow="visible">
        <g filter="url(#petalSoft)">
          <path d="M-12 0 C-8 -8 8 -8 12 0 C8 8 -8 8 -12 0 Z" fill="url(#leafGrad)"/>
          <path d="M-10 0 C-3 -2 4 -1 10 0" stroke="var(--metal-primary)" stroke-width=".8" fill="none" opacity=".5"/>
        </g>
      </symbol>

      <!-- branche de delphinium réutilisable (proportions fixes, haute qualité) -->
      <symbol id="branch" viewBox="0 0 132 132" overflow="visible">
        <g filter="url(#petalSoft)">
          <path d="M2 64 C 16 44, 30 34, 46 30 C 64 25, 82 26, 98 16" stroke="url(#stemGrad)" stroke-width="2.4" fill="none" stroke-linecap="round"/>
          <use href="#leaf" x="6" y="44" width="34" height="34"/>
          <use href="#bud" x="38" y="16" width="24" height="24"/>
          <use href="#delph" x="72" y="0" width="52" height="52"/>
        </g>
      </symbol>
    </defs>
  </svg>

  <div class="water"></div>
  <svg class="grain" width="100%" height="100%" aria-hidden="true">
    <filter id="grainNoise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/></filter>
    <rect width="100%" height="100%" filter="url(#grainNoise)"/>
  </svg>

  <header>
    <a href="/" class="back-link">Retour au site</a>
    <div class="brand-mark">
      <span class="brand-mark-name">Delphinium</span>
      <span class="brand-mark-sub">Interactive</span>
    </div>
  </header>

  <div class="wrap">
    <div class="product-head">
      <span class="collection">Collection fleur</span>
      <h1 class="product-title" id="productTitle">Bague Corolle</h1>
      <p class="product-sub" id="productSub">&nbsp;</p>
      <div class="price" id="price">—<span class="cur"> €</span></div>
    </div>

    <div class="viewer">
      <div class="viewer-inner">
        <div class="viewer-frame" id="viewerFrame">
          <iframe id="vectary_embed"
                  src="https://app.vectary.com/p/3XBDSWLuqFpKqLr93wCTsp"
                  allow="xr-spatial-tracking; fullscreen;"
                  title="Configurateur 3D — bague Delphinium"></iframe>
        </div>

        <!-- Cadre peint : halo pinceau flou + trait net (aspect aquarelle) -->
        <svg class="brush-frame" aria-hidden="true"></svg>

        <!-- Deux branches de delphinium entrant aux coins opposés -->
        <svg class="branch branch-tl" viewBox="0 0 132 132" aria-hidden="true"><g class="bloomable"><use href="#branch"/></g></svg>
        <svg class="branch branch-br" viewBox="0 0 132 132" aria-hidden="true"><g class="bloomable"><use href="#branch"/></g></svg>
      </div>
    </div>

    <div class="panel">
      <p class="status" id="status">Initialisation…</p>

      <div class="card">
        <svg class="card-frame" aria-hidden="true"></svg>
        <svg class="card-flourish" style="top:-14px; left:-10px;" width="46" height="46" viewBox="0 0 46 46" aria-hidden="true">
          <g transform="translate(23,23)">
            <use href="#leaf" x="-14" y="4" width="18" height="18"/>
            <use href="#delph" x="-8" y="-16" width="22" height="22"/>
          </g>
        </svg>
        <h2>Métal</h2>
        <div class="opts" id="metals"></div>
      </div>

      <div class="card">
        <svg class="card-frame" aria-hidden="true"></svg>
        <svg class="card-flourish" style="top:-12px; right:-10px;" width="52" height="52" viewBox="0 0 52 52" aria-hidden="true">
          <g transform="translate(26,26)">
            <path d="M-14 8 C -6 2, 6 -4, 12 -10" stroke="url(#stemGrad)" stroke-width="1.4" fill="none" stroke-linecap="round"/>
            <use href="#delph" x="4" y="-20" width="20" height="20"/>
            <use href="#bud" x="-8" y="-2" width="12" height="12"/>
          </g>
        </svg>
        <h2>Pierre</h2>
        <div class="opts" id="stones"></div>
      </div>

      <div class="card">
        <svg class="card-frame" aria-hidden="true"></svg>
        <svg class="card-flourish" style="bottom:-10px; left:-8px;" width="42" height="42" viewBox="0 0 42 42" aria-hidden="true">
          <g transform="translate(21,21)">
            <use href="#leaf" x="-14" y="-6" width="20" height="20"/>
            <use href="#bud" x="0" y="-6" width="10" height="10"/>
          </g>
        </svg>
        <h2>Forme</h2>
        <div class="opts" id="shapes"></div>
      </div>

      <div class="card">
        <svg class="card-frame" aria-hidden="true"></svg>
        <svg class="card-flourish" style="top:-8px; right:-6px;" width="28" height="28" viewBox="0 0 28 28" aria-hidden="true">
          <use href="#bud" x="4" y="4" width="20" height="20"/>
        </svg>
        <h2>Gravure <span class="counter"><span id="count">0</span>/20</span></h2>
        <div class="engrave">
          <input id="engrave" maxlength="20" placeholder="ex : S + R — 09.2020" autocomplete="off">
        </div>
      </div>

      <a class="cta" href="/#contact">Demander un devis</a>
    </div>
  </div>

  <footer>
    <span>© 2026 Delphinium Interactive · Paris</span>
    <a href="/#contact">Un projet similaire ? Contactez-nous</a>
  </footer>

  <script type="module">
    import { VctrModelApi } from "https://app.vectary.com/studio-lite/scripts/api.js";

    // --- Config à garder synchro avec les noms réels dans Studio -----------
    // Métal : le nom affiché = le nom du matériau dans Studio (déjà en FR).
    // primary/accent pilotent les variables CSS (halos, motifs floraux, cadres).
    const METALS = [
      { name: "Or",       primary:"#D4B884", accent:"#EED9A8",
        grad:"radial-gradient(circle at 32% 22%, #fbeecb, #dfc98e 52%, #b08f4c)", text:"#4a3813", glow:"rgba(223,201,142,.6)" },
      { name: "Or Blanc", primary:"#B5B3C2", accent:"#E6E4EF",
        grad:"radial-gradient(circle at 32% 22%, #ffffff, #e6e6ec 52%, #b6b6c2)", text:"#33333f", glow:"rgba(230,230,236,.6)" },
      { name: "Or Rose",  primary:"#C8927E", accent:"#EBBFB0",
        grad:"radial-gradient(circle at 32% 22%, #ffe6da, #e5b19e 52%, #c8846c)", text:"#4a2318", glow:"rgba(230,184,156,.6)" },
    ];
    // Pierre : label FR affiché ↔ nom d'objet Vectary EN (on ne touche pas la scène 3D).
    // primary/glow/petal pilotent les variables CSS pierre.
    const STONES = [
      { label:"Diamant",  name:"Diamond",  primary:"#DCD6E6", glow:"#F0EBF7", petal:"#C8BED8", swatch:"#e8e2f0" },
      { label:"Saphir",   name:"Sapphire", primary:"#7A8AC4", glow:"#A5B4E0", petal:"#6E7DB8", swatch:"#8394d0" },
      { label:"Rubis",    name:"Ruby",     primary:"#C87888", glow:"#E0A0AF", petal:"#B8687A", swatch:"#d489a0" },
      { label:"Émeraude", name:"Emerald",  primary:"#9DB8A2", glow:"#C0DCC5", petal:"#A895C4", swatch:"#9DB8A2" },
    ];
    // Forme : nom d'objet Vectary ↔ silhouette SVG affichée.
    const SHAPES = [
      { name:"Corolle", svg:`<svg width="26" height="26" viewBox="0 0 26 26"><circle cx="13" cy="13" r="10" fill="none" stroke="var(--metal-primary)" stroke-width="1.4"/><circle cx="13" cy="13" r="2.2" fill="var(--metal-primary)"/></svg>` },
      { name:"Pétale",  svg:`<svg width="26" height="26" viewBox="0 0 26 26"><ellipse cx="13" cy="13" rx="8" ry="11" fill="none" stroke="var(--metal-primary)" stroke-width="1.4"/><ellipse cx="13" cy="13" rx="2" ry="2.8" fill="var(--metal-primary)"/></svg>` },
    ];
    const VARIANT = "Pierres Variantes";        // renomme ici si tu as renommé le container
    const TEXT_OBJECT = "3D Text";              // nom de l'objet Texte 3D pour la gravure
    // -----------------------------------------------------------------------

    const METAL_NAMES = METALS.map(m => m.name);
    const STONE_NAMES = STONES.map(s => s.name);              // noms Vectary EN
    const STONE_FR    = Object.fromEntries(STONES.map(s => [s.name, s.label]));
    const METAL_BY_NAME = Object.fromEntries(METALS.map(m => [m.name, m]));
    const STONE_BY_NAME = Object.fromEntries(STONES.map(s => [s.name, s]));

    // Grille de prix additive interne — l'UI n'affiche jamais le détail, seulement le total.
    const PRICE = {
      base:  { "Corolle":1350, "Pétale":1200 },
      metal: { "Or":300, "Or Blanc":350, "Or Rose":320 },
      stone: { "Diamond":900, "Sapphire":450, "Ruby":500, "Emerald":550 },
    };
    function computePrice(metal, stone, shape) {
      let p = PRICE.base[shape] ?? PRICE.base["Corolle"];
      p += PRICE.metal[metal] ?? 0;
      p += PRICE.stone[stone] ?? 0;
      return p;
    }

    const statusEl     = document.getElementById("status");
    const viewerFrame  = document.getElementById("viewerFrame");
    const titleEl      = document.getElementById("productTitle");
    const subEl        = document.getElementById("productSub");
    const priceEl      = document.getElementById("price");
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    // ── Cadres « dessinés à la main » ajustés à la taille RÉELLE de chaque interface ──
    // On mesure chaque élément et on trace un rectangle ondulant à ses dimensions px :
    // l'amplitude reste constante, le trait colle au cadre quel que soit le ratio.
    function seededRand(seed) {
      let s = seed * 9301 + 49297;
      return () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
    }
    function handDrawnRectPath(w, h, { inset = 6, amp = 2.2, seg = 22, seed = 1 } = {}) {
      const rnd = seededRand(seed);
      const x0 = inset, y0 = inset, x1 = w - inset, y1 = h - inset, pts = [];
      const edge = (ax, ay, bx, by, nx, ny) => {
        const len = Math.hypot(bx - ax, by - ay), n = Math.max(2, Math.round(len / seg));
        for (let i = 0; i < n; i++) {
          const t = i / n, off = (rnd() * 2 - 1) * amp;
          pts.push([ax + (bx - ax) * t + nx * off, ay + (by - ay) * t + ny * off]);
        }
      };
      edge(x0, y0, x1, y0, 0, -1); edge(x1, y0, x1, y1, 1, 0);
      edge(x1, y1, x0, y1, 0, 1); edge(x0, y1, x0, y0, -1, 0);
      const n = pts.length;
      let d = `M${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`;
      for (let i = 0; i < n; i++) {
        const p0 = pts[(i - 1 + n) % n], p1 = pts[i], p2 = pts[(i + 1) % n], p3 = pts[(i + 2) % n];
        const c1x = p1[0] + (p2[0] - p0[0]) / 6, c1y = p1[1] + (p2[1] - p0[1]) / 6;
        const c2x = p2[0] - (p3[0] - p1[0]) / 6, c2y = p2[1] - (p3[1] - p1[1]) / 6;
        d += `C${c1x.toFixed(1)} ${c1y.toFixed(1)} ${c2x.toFixed(1)} ${c2y.toFixed(1)} ${p2[0].toFixed(1)} ${p2[1].toFixed(1)}`;
      }
      return d + "Z";
    }
    function paintFrame(svg, { seed = 1, inset = 6, sw = 1.6, amp = 2.2, seg = 20, halo = false } = {}) {
      const r = svg.getBoundingClientRect();
      const w = Math.round(r.width), h = Math.round(r.height);
      if (!w || !h) return;
      svg.setAttribute("viewBox", `0 0 ${w} ${h}`);
      svg.setAttribute("preserveAspectRatio", "none");
      const d = handDrawnRectPath(w, h, { inset, amp, seg, seed });
      const halic = halo
        ? `<path d="${d}" fill="none" stroke="url(#frameGrad)" stroke-width="9" opacity=".14" filter="url(#softBlur)"/>`
        : "";
      svg.innerHTML = halic +
        `<path d="${d}" fill="none" stroke="url(#frameGrad)" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"/>`;
    }
    function paintAllFrames() {
      // viewer : cadre au plus près du bord (faible retrait + faible amplitude → colle au viewer)
      const vf = document.querySelector(".brush-frame");
      if (vf) paintFrame(vf, { seed: 7, inset: 5, sw: 2.4, amp: 1.8, seg: 30, halo: true });
      document.querySelectorAll(".card-frame").forEach((el, i) =>
        paintFrame(el, { seed: 11 + i * 7, inset: 6, sw: 1.6, amp: 2.2, seg: 20 }));
    }
    paintAllFrames();
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(paintAllFrames);
    setTimeout(paintAllFrames, 500);
    let _rfTimer;
    window.addEventListener("resize", () => { clearTimeout(_rfTimer); _rfTimer = setTimeout(paintAllFrames, 180); });

    const api = new VctrModelApi("vectary_embed");
    window.api = api;
    await api.init();
    statusEl.style.display = "none";   // "Initialisation…" masqué une fois le modèle chargé

    function stripIds(c) {
      const x = { ...c };
      delete x.active_material_instanceId; delete x.object_instanceId;
      delete x.active_object_instanceId;   delete x.variant_instanceId;
      return x;
    }

    // --- Pilotage des variables CSS partagées (halos, motifs, cadres suivent) ---
    const rootStyle = document.documentElement.style;
    function applyMetalVars(name) {
      const m = METAL_BY_NAME[name]; if (!m) return;
      rootStyle.setProperty("--metal-primary", m.primary);
      rootStyle.setProperty("--metal-accent",  m.accent);
    }
    function applyStoneVars(name) {
      const s = STONE_BY_NAME[name]; if (!s) return;
      rootStyle.setProperty("--stone-primary", s.primary);
      rootStyle.setProperty("--stone-glow",    s.glow);
      rootStyle.setProperty("--stone-petal",   s.petal);
    }

    // Floraison des motifs floraux + halo du viewer à chaque changement de config
    function pulseViewer() {
      if (reduceMotion) return;
      // Halo du viewer — retiré puis réappliqué pour rejouer à chaque changement
      viewerFrame.classList.remove("pulse");
      const bloomers = document.querySelectorAll(".card-flourish, .bloomable");
      bloomers.forEach(el => el.classList.remove("bloom"));
      // reflow FIABLE sur un élément HTML (offsetWidth d'un nœud SVG ne force pas le layout)
      void document.body.offsetWidth;
      viewerFrame.classList.add("pulse");
      setTimeout(() => viewerFrame.classList.remove("pulse"), 700);
      bloomers.forEach(el => el.classList.add("bloom"));
    }

    async function setMaterial(fromNames, newMat) {
      const cfg = await api.getConfigurationState();
      const next = cfg
        .filter(c => "active_material" in c && fromNames.includes(c.active_material) && c.active_material !== newMat)
        .map(c => ({ ...stripIds(c), active_material: newMat }));
      if (next.length) await api.setConfigurationState(next);
      await refresh();
      pulseViewer();
    }

    async function setShape(objName) {
      const cfg = await api.getConfigurationState();
      const next = cfg
        .filter(c => "active_object" in c && c.variant === VARIANT && c.active_object !== objName)
        .map(c => ({ ...stripIds(c), active_object: objName }));
      if (next.length) { await api.setConfigurationState(next); await refresh(); pulseViewer(); }
    }

    // --- Gravure : écrit directement dans l'objet Texte 3D -----------------
    async function setEngraving(text) {
      try { await api.setText3d(TEXT_OBJECT, { text }); } catch (e) {}
    }
    function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

    // --- Contrôles ---------------------------------------------------------
    const metalsBox = document.getElementById("metals");
    const stonesBox = document.getElementById("stones");
    const shapesBox = document.getElementById("shapes");

    function optButton(container, dataName, cls, html, onClick) {
      const el = document.createElement("button");
      el.type = "button";
      el.className = "opt " + cls;
      el.dataset.name = dataName;
      el.innerHTML = html;
      el.addEventListener("click", onClick);
      container.appendChild(el);
      return el;
    }

    METALS.forEach(m => {
      const el = optButton(metalsBox, m.name, "metal-opt", m.name, () => setMaterial(METAL_NAMES, m.name));
      el.style.background = m.grad;
      el.style.color = m.text;
      el.style.setProperty("--glow", m.glow);
    });

    // Gemme facettée vue de 3/4 — table lumineuse, facettes pavillon plus sombres, éclat
    const GEM_SVG = `<svg class="gem" viewBox="0 0 56 60" aria-hidden="true">
      <g stroke="rgba(255,255,255,.30)" stroke-width=".7" stroke-linejoin="round">
        <polygon points="28,3 50,20 40,53 16,53 6,20" fill="var(--gem)"/>
        <polygon points="28,3 50,20 28,27 6,20" fill="var(--gem-glow)"/>
        <polygon points="6,20 28,27 16,53" fill="color-mix(in srgb, var(--gem) 55%, #241a38)"/>
        <polygon points="50,20 28,27 40,53" fill="color-mix(in srgb, var(--gem) 55%, #241a38)"/>
        <polygon points="16,53 28,27 40,53" fill="color-mix(in srgb, var(--gem) 78%, #241a38)"/>
        <line x1="6" y1="20" x2="50" y2="20"/>
        <line x1="28" y1="3" x2="28" y2="27"/>
      </g>
      <polygon points="28,6 43,19 28,23 13,19" fill="#fff" opacity=".22"/>
    </svg>`;
    STONES.forEach(s => {
      const html = GEM_SVG + `<span class="shape-name">${s.label}</span>`;
      const el = optButton(stonesBox, s.name, "stone-opt", html, () => setMaterial(STONE_NAMES, s.name));
      el.style.setProperty("--gem", s.primary);
      el.style.setProperty("--gem-glow", s.glow);
    });

    SHAPES.forEach(s => {
      const html = s.svg + `<span class="shape-name">${s.name}</span>`;
      optButton(shapesBox, s.name, "shape-opt", html, () => setShape(s.name));
    });

    const engraveInput = document.getElementById("engrave");
    const countEl = document.getElementById("count");
    engraveInput.addEventListener("input", (e) => {
      countEl.textContent = e.target.value.length;
      countEl.parentElement.classList.toggle("max", e.target.value.length >= 20);
    });
    engraveInput.addEventListener("input", debounce((e) => setEngraving(e.target.value), 250));

    // Les cartes ont maintenant leur contenu → on retrace les cadres à leur taille définitive
    paintAllFrames();
    requestAnimationFrame(paintAllFrames);

    // --- Affichage fiche produit -------------------------------------------
    function updatePrice(value) {
      const formatted = value.toLocaleString("fr-FR") + '<span class="cur"> €</span>';
      if (priceEl.dataset.val === String(value)) return;
      priceEl.dataset.val = String(value);
      if (reduceMotion) { priceEl.innerHTML = formatted; return; }
      priceEl.classList.add("changing");
      setTimeout(() => {
        priceEl.innerHTML = formatted;
        priceEl.classList.remove("changing");
      }, 130);
    }

    function updateFiche(metal, stone, shape) {
      titleEl.textContent = "Bague " + (shape ?? "Corolle");
      const parts = [];
      if (metal) parts.push(metal);
      if (stone) parts.push(STONE_FR[stone] ?? stone);
      subEl.textContent = parts.length ? parts.join(" · ") : " ";
      if (metal) applyMetalVars(metal);
      if (stone) applyStoneVars(stone);
      updatePrice(computePrice(metal, stone, shape));
    }

    async function refresh() {
      const cfg = await api.getConfigurationState();
      let metal = null, stone = null, shape = null;
      for (const c of cfg) {
        if ("active_material" in c && METAL_NAMES.includes(c.active_material)) metal = c.active_material;
        if ("active_material" in c && STONE_NAMES.includes(c.active_material)) stone = c.active_material;
        if ("active_object" in c && c.variant === VARIANT) shape = c.active_object;
      }
      const mark = (box, val) => box.querySelectorAll(".opt")
        .forEach(ch => ch.classList.toggle("active", ch.dataset.name === val));
      mark(metalsBox, metal); mark(stonesBox, stone); mark(shapesBox, shape);
      updateFiche(metal, stone, shape);
    }

    try { await api.addEventListener("configurator_state_change", () => refresh()); } catch (e) {}
    await refresh();
  </script>
</body>
